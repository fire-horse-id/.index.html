<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="nav-root"></div>

    <main class="max-w-5xl mx-auto px-6 pt-32 pb-20">
        <section class="flex flex-col md:flex-row gap-12 items-center fade-in">
            <div class="flex-1 space-y-6 text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-500 text-[9px] font-black tracking-widest uppercase">
                    ✨ New Release v1.0
                </div>
                <h1 id="appName" class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-tight">Loading...</h1>
                <p id="appDesc" class="text-md opacity-60 leading-relaxed max-w-md mx-auto md:mx-0"></p>
                <div class="pt-4">
                    <a id="playstoreBtn" href="#" class="btn-main shadow-lg shadow-indigo-500/20">UNDUH SEKARANG</a>
                </div>
            </div>
            
            <div class="flex-1 flex justify-center">
                <div class="glass-card shadow-xl border-white/5 relative overflow-hidden group">
                    <img id="qrCode" class="w-56 h-56 rounded-2xl bg-white p-3">
                    <div class="mt-4 text-center text-[10px] font-bold opacity-30 uppercase tracking-widest">Scan to Download</div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-root"></div>
    <script src="assets/js/core.js"></script>
    <script>
        renderGlobalUI();
        // Integrasi data API silakan disesuaikan dengan api.json Anda
        async function loadData() {
            try {
                const res = await fetch("api.json");
                const data = await res.json();
                document.getElementById("appName").innerText = data.app_info.app_name;
                document.getElementById("appDesc").innerText = data.app_info.description;
                document.getElementById("playstoreBtn").href = data.app_info.playstore_url;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(data.app_info.playstore_url)}`;
            } catch (e) {
                document.getElementById("appName").innerText = "Audio Hijrah";
                document.getElementById("appDesc").innerText = "Aplikasi pemutar audio dakwah pilihan untuk menemani hijrah Anda.";
            }
        }
        loadData();
    </script>
</body>
</html>
