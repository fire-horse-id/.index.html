<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
    <div id="nav"></div>
    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 py-16 fade-in">
            <div class="flex-1 text-center md:text-left space-y-6">
                <h1 class="text-5xl md:text-7xl font-black leading-tight" id="appTitle">Audio Hijrah</h1>
                <p class="text-lg opacity-70" id="appDesc">Memuat deskripsi...</p>
                <div class="pt-4">
                    <a id="playLink" href="#" class="btn-primary">
                        <span>Unduh Sekarang</span>
                    </a>
                </div>
            </div>
            <div class="flex-1 flex justify-center">
                <div class="glass p-8 shadow-2xl">
                    <img id="qrCode" class="w-44 h-44 rounded-xl bg-white p-2">
                </div>
            </div>
        </section>
        <section class="py-20">
            <h2 class="text-center text-3xl font-black mb-12">Fitur Unggulan</h2>
            <div id="featureGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("nav").innerHTML = renderNav();
            document.getElementById("footer").innerHTML = renderFooter();
            loadData().then(data => {
                document.getElementById("appTitle").innerText = data.developer.app;
                document.getElementById("appDesc").innerText = data.description;
                document.getElementById("playLink").href = data.developer.playstore;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.developer.playstore)}`;
                document.getElementById("featureGrid").innerHTML = data.features.map(f => `
                    <div class="glass p-8 hover:bg-indigo-500/5 transition-all">
                        <h4 class="font-bold text-xl mb-2">${f}</h4>
                    </div>
                `).join("");
            });
        });
    </script>
</body>
</html>
