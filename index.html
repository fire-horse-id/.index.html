<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="dark:bg-slate-950">
    <div id="nav"></div>

    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 py-16 animate-up">
            <div class="flex-1 text-center md:text-left space-y-6">
                <div class="inline-block px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold uppercase tracking-widest">Version 1.0</div>
                <h1 class="text-6xl font-black leading-none dark:text-white" id="appTitle">...</h1>
                <p class="text-lg opacity-70" id="appDesc">Memuat...</p>
                <div class="pt-4">
                    <a id="playLink" href="#" class="btn-primary inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-white font-bold">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" class="h-6">
                        <span>Unduh Sekarang</span>
                    </a>
                </div>
            </div>
            <div class="flex-1 flex justify-center">
                <div class="glass p-6 rounded-[2.5rem] shadow-2xl border-white/5">
                    <img id="qrCode" class="w-48 h-48 rounded-xl bg-white p-2">
                </div>
            </div>
        </section>

        <section class="py-20">
            <h2 class="text-center text-3xl font-bold mb-12">Fitur Unggulan</h2>
            <div id="featureGrid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("nav").innerHTML = renderNav();
            document.getElementById("footer").innerHTML = renderFooter();

            loadData().then(data => {
                document.getElementById("appTitle").innerText = data.developer.app;
                document.getElementById("appDesc").innerText = data.description;
                document.getElementById("playLink").href = data.developer.playstore;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.developer.playstore)}`;
                
                document.getElementById("featureGrid").innerHTML = data.features.map(f => `
                    <div class="glass p-8 rounded-[2rem] border-white/5 hover:bg-white/5 transition">
                        <div class="text-2xl mb-4">✨</div>
                        <h4 class="font-bold text-xl mb-2">${f.title}</h4>
                        <p class="text-sm opacity-60">${f.desc}</p>
                    </div>
                `).join("");
            });
        });
    </script>
</body>
</html>
