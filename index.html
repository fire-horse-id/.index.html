<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="dark:bg-slate-950">
    <div id="nav"></div>

    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 py-16 md:py-24 fade-up">
            <div class="flex-1 text-center md:text-left space-y-6">
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 text-indigo-500 text-[10px] font-black uppercase tracking-widest">
                    <span>✨</span> New Experience
                </div>
                <h1 class="text-5xl md:text-7xl font-black leading-tight tracking-tighter" id="appTitle">Loading...</h1>
                <p class="text-lg opacity-60 leading-relaxed max-w-xl mx-auto md:mx-0" id="appDesc">Mohon tunggu, sedang memuat data...</p>
                <div class="pt-4">
                    <a id="playLink" href="#" class="btn-premium px-8 py-4 rounded-2xl inline-flex items-center gap-3">
                        <span>UNDUH SEKARANG</span>
                    </a>
                </div>
            </div>

            <div class="flex-1 flex justify-center">
                <div class="glass-card p-8 shadow-2xl bg-white/5">
                    <div class="bg-white p-3 rounded-2xl shadow-lg">
                        <img id="qrCode" class="w-40 h-40">
                    </div>
                </div>
            </div>
        </section>

        <section class="py-12">
            <div id="featureGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script>
        // Jalankan render awal
        document.getElementById("nav").innerHTML = renderNav();
        document.getElementById("footer").innerHTML = renderFooter();

        // Load Data dari api.json
        loadData().then(data => {
            if (data) {
                document.getElementById("appTitle").innerText = data.developer.app;
                document.getElementById("appDesc").innerText = data.description;
                document.getElementById("playLink").href = data.developer.playstore;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.developer.playstore)}`;
                
                document.getElementById("featureGrid").innerHTML = data.features.map(f => `
                    <div class="glass-card p-6 border border-white/5 hover:border-indigo-500/30 transition-all">
                        <div class="text-indigo-500 mb-4">💎</div>
                        <h4 class="font-bold text-lg mb-2 uppercase tracking-tighter">${f}</h4>
                        <p class="text-xs opacity-50">Layanan premium untuk pengalaman terbaik Anda.</p>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
