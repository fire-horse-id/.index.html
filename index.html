<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="dark:bg-slate-950">
    <div id="nav"></div>

    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 py-16 md:py-24 fade-in">
            <div class="flex-1 text-center md:text-left space-y-6">
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 text-indigo-500 text-[10px] font-black uppercase tracking-widest">
                    <span>✨</span> New Release v1.0
                </div>
                <h1 class="text-5xl md:text-7xl font-black leading-tight tracking-tighter" id="appTitle">Loading...</h1>
                <p id="appDesc" class="text-lg opacity-70 leading-relaxed max-w-xl mx-auto md:mx-0">Mohon tunggu, sedang sinkronisasi data...</p>
                <div class="pt-4">
                    <a id="playLink" href="#" class="btn-premium px-10 py-4 rounded-2xl inline-flex items-center gap-3 shadow-xl">
                        <span>UNDUH SEKARANG</span>
                    </a>
                </div>
            </div>

            <div class="flex-1 flex justify-center">
                <div class="glass-card p-8 bg-white/5 border border-white/10 rounded-[2.5rem] shadow-2xl">
                    <div class="bg-white p-3 rounded-2xl shadow-inner">
                        <img id="qrCode" class="w-40 h-40">
                    </div>
                    <p class="text-[10px] font-bold opacity-40 text-center mt-4 tracking-widest uppercase">Scan to Download</p>
                </div>
            </div>
        </section>

        <section class="py-12">
            <h2 class="text-center text-2xl font-black mb-12 uppercase tracking-tighter">Kenapa Memilih Kami?</h2>
            <div id="featureGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section class="grid md:grid-cols-2 gap-8 py-12 border-t border-white/5">
            <div class="glass-card p-8">
                <h3 class="font-black text-xl mb-6 uppercase tracking-tighter">Spesifikasi</h3>
                <ul id="specs" class="space-y-3 opacity-70 text-sm"></ul>
            </div>
            <div class="glass-card p-8">
                <h3 class="font-black text-xl mb-6 uppercase tracking-tighter">Cara Pakai</h3>
                <ul id="tutorial" class="space-y-3 opacity-70 text-sm"></ul>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("nav").innerHTML = renderNav();
            document.getElementById("footer").innerHTML = renderFooter();

            loadData().then(data => {
                if (data) {
                    document.getElementById("appTitle").innerText = data.developer.app;
                    document.getElementById("appDesc").innerText = data.description;
                    document.getElementById("playLink").href = data.developer.playstore;
                    document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.developer.playstore)}`;
                    
                    document.getElementById("featureGrid").innerHTML = data.features.map(f => `
                        <div class="glass-card p-8 hover:bg-indigo-500/5 transition-all group">
                            <div class="text-indigo-500 mb-4 text-xl">💎</div>
                            <h4 class="font-black text-lg mb-2 uppercase tracking-tighter">${f}</h4>
                            <p class="text-xs opacity-40 leading-relaxed">Nikmati akses konten premium tanpa batas dengan kualitas terbaik.</p>
                        </div>
                    `).join("");

                    document.getElementById("specs").innerHTML = Object.values(data.specs).map(s => `
                        <li class="flex items-center gap-3">
                            <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span> ${s}
                        </li>
                    `).join("");

                    document.getElementById("tutorial").innerHTML = data.tutorial.map(t => `
                        <li class="flex items-start gap-3">
                            <span class="font-black text-indigo-500 text-xs mt-1">0${data.tutorial.indexOf(t)+1}</span> ${t}
                        </li>
                    `).join("");
                }
            });
        });
    </script>
</body>
</html>
