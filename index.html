<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="nav-root"></div>

    <main class="max-w-6xl mx-auto px-6 pt-32">
        <section class="grid md:grid-cols-2 gap-16 items-center fade-in">
            <div class="space-y-8 text-center md:text-left">
                <div class="inline-block px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-500 text-[10px] font-black tracking-widest uppercase">New Release v1.0</div>
                <h1 id="appName" class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-none">Loading...</h1>
                <p id="appDesc" class="text-lg opacity-60 leading-relaxed max-w-lg"></p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                    <a id="playstoreBtn" href="#" class="btn-main">GET IT ON PLAYSTORE</a>
                </div>
            </div>
            
            <div class="flex justify-center">
                <div class="glass-card bg-white/5 shadow-2xl rotate-2 hover:rotate-0 transition-transform duration-500">
                    <img id="qrCode" class="w-48 h-48 rounded-xl bg-white p-2">
                    <p class="text-center mt-6 text-[10px] font-bold opacity-40 uppercase tracking-widest">Scan to Install</p>
                </div>
            </div>
        </section>

        <div id="features" class="grid md:grid-cols-3 gap-6 py-24"></div>
    </main>

    <div id="footer-root"></div>
    <script src="assets/js/core.js"></script>
    <script>
        renderGlobalUI();
        fetchAppData().then(data => {
            if(data) {
                document.getElementById("appName").innerText = data.app_info.app_name;
                document.getElementById("appDesc").innerText = data.app_info.description;
                document.getElementById("playstoreBtn").href = data.app_info.playstore_url;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.app_info.playstore_url)}`;
                document.getElementById("features").innerHTML = data.features.map(f => `
                    <div class="glass-card group hover:border-indigo-500/30 transition">
                        <h4 class="font-black text-xl mb-3 uppercase tracking-tighter">${f.title}</h4>
                        <p class="text-sm opacity-50">${f.desc}</p>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
