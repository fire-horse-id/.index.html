<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
    <div id="nav"></div>
    <main class="max-w-4xl mx-auto px-6 py-20 fade-in">
        <div class="glass p-10">
            <h1 class="text-4xl font-black mb-10">Support Center</h1>
            <div id="social" class="flex flex-col gap-4 text-indigo-500 font-bold"></div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById("nav").innerHTML = renderNav();
        document.getElementById("footer").innerHTML = renderFooter();
        loadData().then(data => {
            document.getElementById("social").innerHTML = `
                <a href="mailto:${data.support.email}">📧 Email Support</a>
                <a href="${data.support.whatsapp}">📱 WhatsApp</a>
            `;
        });
    </script>
</body>
</html>
